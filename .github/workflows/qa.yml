name: QA publicación web P12

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4
      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verificar manifiesto público
        run: python scripts/verificar_manifest_publico.py .
      - name: Verificar manifiesto estático
        run: python scripts/verificar_static_manifest.py .
      - name: Auditar publicación web
        run: python scripts/auditar_publicacion_web.py .
      - name: Verificar sintaxis JavaScript
        run: python scripts/verificar_sintaxis_js.py .
      - name: Verificar motor web público
        run: node scripts/verificar_motor_web_publico.mjs
