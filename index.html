<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#183f63">
  <title>Gestor de Horarios Escolares</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<a class="skip-link" href="#pageHost">Saltar al contenido principal</a>
<div id="appShell" class="app-shell">
  <aside class="sidebar" aria-label="Navegación principal">
    <div class="brand">
      <div class="brand-mark">GH</div>
      <div><strong>Gestor de Horarios</strong><span>Producto · 0.6.0-product-alpha.32.1</span><small>Núcleo 0.6.0-alpha.25</small></div>
    </div>
    <nav id="mainNav" aria-label="Secciones de la aplicación">
      <button type="button" data-page="home" class="active" aria-current="page" aria-controls="pageHost">Inicio</button>
      <button type="button" data-page="data" aria-controls="pageHost">Datos</button>
      <button type="button" data-page="organization" aria-controls="pageHost">Organización</button>
      <button type="button" data-page="schedule" aria-controls="pageHost">Horario</button>
      <button type="button" data-page="daily" aria-controls="pageHost">Gestión diaria</button>
      <button type="button" data-page="documents" aria-controls="pageHost">Documentos</button>
      <button type="button" data-page="system" aria-controls="pageHost">Sistema</button>
    </nav>
    <div class="sidebar-status"><span id="storageBadge">Almacenamiento local</span><small id="versionBadge">0.6.0-product-alpha.32.1</small></div>
  </aside>
  <main id="mainContent">
    <header class="topbar">
      <div><h1 id="pageTitle">Inicio</h1><p id="projectSubtitle">Sin proyecto activo</p></div>
      <div class="top-actions"><span id="connectionBadge" class="connection-badge" role="status" aria-live="polite">En línea</span><span id="saveState" class="save-state" role="status" aria-live="polite">Sin cambios</span><button id="saveNowBtn" class="btn secondary" type="button">Guardar</button></div>
    </header>
    <div id="routeAnnouncer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div><div id="assertiveAnnouncer" class="sr-only" role="alert" aria-live="assertive" aria-atomic="true"></div><div id="noticeHost" aria-live="polite" aria-atomic="true"></div>
    <section id="pageHost" class="content" tabindex="-1" role="region" aria-labelledby="pageTitle"></section>
  </main>
</div>
<div id="modalHost" aria-live="assertive"></div>
<input id="projectFileInput" type="file" accept=".ghfproject,.json,application/json,application/zip,application/vnd.ghfproject+zip" hidden>
<script type="module" src="assets/js/app.mjs"></script>
</body>
</html>
